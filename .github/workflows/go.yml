name: Go

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    strategy:
      matrix:
        platform:
          - ubuntu-latest # amd64
          - ubuntu-24.04-arm # arm64
    runs-on: ${{ matrix.platform }}
    steps:
    - name: Checkout Code
      uses: actions/checkout@v6
    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version-file: 'go.work'
        cache-dependency-path: |
          go.mod
          **/go.mod
    - name: Setup Mage
      run: go tool mage -l

    - name: Build
      run: go tool mage -v compile
    - name: Test
      run: go tool mage -v test
  lint:
    # don't need to run lint per-platform for now
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v6
    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version-file: 'go.work'
        # include the golangci config in the go cache hash so that we don't
        # collide with build cache, and don't have to add an extra file
        cache-dependency-path: |
          .golangci.yaml
          go.mod
          **/go.mod
    - name: Setup Mage
      run: go tool mage -l

    - name: Check codegen
      run: |
        go generate -x work
        git diff --exit-code

    - name: Golangci-lint
      uses: golangci/golangci-lint-action@v9
      # can use latest release nowadays
    - name: Other Lint
      run: go tool mage -v lint:other
